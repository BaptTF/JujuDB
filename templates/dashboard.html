<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JujuDB - Tableau de bord</title>
    <!-- Favicon -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Load CSS modules -->
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/search.css">
    <link rel="stylesheet" href="/static/css/articles.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    <link rel="stylesheet" href="/static/css/responsive.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>🧊 JujuDB</h1>
            <div class="header-actions">
                <a href="/locations" class="btn btn-secondary">Gérer les emplacements</a>
                <form method="POST" action="/logout" style="display: inline;">
                    <button type="submit" class="btn btn-secondary">Déconnexion</button>
                </form>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="search-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Rechercher un article..." class="search-input">
                <button id="searchBtn" class="btn btn-primary">Rechercher</button>
            </div>
            
            <div class="filters">
                <select id="locationFilter" class="filter-select">
                    <option value="">Tous les emplacements</option>
                    <!-- Options injectées dynamiquement -->
                </select>
                
                <select id="subLocationFilter" class="filter-select" style="display:none;">
                    <option value="">Tous les sous-emplacements</option>
                    <!-- Options injectées dynamiquement en fonction de l'emplacement -->
                </select>
                
                <select id="categoryFilter" class="filter-select">
                    <option value="">Toutes les catégories</option>
                    <!-- Options injectées dynamiquement -->
                </select>
                
                <button id="clearFilters" class="btn btn-secondary">Effacer filtres</button>
            </div>
        </div>

        <div class="actions-section">
            <button id="addItemBtn" class="btn btn-success">+ Ajouter un article</button>
        </div>

        <div class="items-section">
            <div id="itemsContainer" class="items-grid">
                <!-- Items will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Add/Edit Item Modal -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Ajouter un article</h2>
                <span class="close">&times;</span>
            </div>
            <form id="itemForm" class="modal-form">
                <input type="hidden" id="itemId">
                               <div class="form-group">
                    <label for="itemName">Nom de l'article *</label>
                    <input type="text" id="itemName" required>
                </div>
                
                <div class="form-group">
                    <label for="itemDescription">Description</label>
                    <textarea id="itemDescription" rows="3"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="itemLocation">Emplacement *</label>
                        <select id="itemLocation" required>
                            <option value="">Sélectionner...</option>
                            <!-- Options injectées dynamiquement -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="itemSubLocation">Sous-emplacement</label>
                        <select id="itemSubLocation" style="display:none;">
                            <option value="">Sélectionner...</option>
                            <!-- Options injectées dynamiquement en fonction de l'emplacement -->
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="itemCategory">Catégorie</label>
                        <select id="itemCategory">
                            <option value="">Sélectionner...</option>
                            <!-- Options injectées dynamiquement -->
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="itemQuantity">Quantité</label>
                        <input type="number" id="itemQuantity" min="1" value="1">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="itemExpiry">Date d'expiration</label>
                        <input type="date" id="itemExpiry">
                    </div>
                    
                    <div class="form-group">
                        <label for="itemNotes">Notes</label>
                        <textarea id="itemNotes" rows="2" placeholder="Informations supplémentaires..."></textarea>
                    </div>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Load feature modules -->
    <script src="/static/js/locations.js"></script>
    <script src="/static/js/sub-locations.js"></script>
    <script src="/static/js/categories.js"></script>
    <script src="/static/js/articles.js"></script>
    <script src="/static/js/filters.js"></script>
    <script src="/static/js/search.js"></script>
    
    <!-- Dashboard coordinator -->
    <script src="/static/js/app.js"></script>
</body>
</html>
